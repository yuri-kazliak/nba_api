services:
  api:
    build: .
    command: ["poetry", "run", "uvicorn", "nba_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8018:8000"
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
