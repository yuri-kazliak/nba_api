#WORKS!!
  deploy:
    runs-on: ubuntu-latest
    # needs: build_and_push
    
    steps:
      - name: Print
        run:  echo $IMAGE_NAME
      - name: Checkout files    
        uses: actions/checkout@v2
      - name: Deploy to Digital Ocean droplet via SSH action
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSHKEY }}
          envs: IMAGE_NAME
          script: |

            # Stop running container
            docker container stop yurasick/my_basket_api:0.0.1
            # Remove old container
            docker container rm yurasick/my_basket_api:0.0.1
            # Pull a new container
            docker image pull yurasick/my_basket_api:0.0.1
            # Run a new container from a new image
            docker run -d \
            --restart always \
            --name yurasick/my_basket_api:0.0.1 \
            -p 8018:8000 \
            yurasick/my_basket_api:0.0.1

