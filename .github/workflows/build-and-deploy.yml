name: NBA Stats API CI/CD

permissions:
  contents: read

on:
  release:
    types: [published]

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.CONTAINER_NAME }}:${{ github.ref_name }}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "poetry"

      - name: Install Poetry
        run: pipx install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run Ruff
        run: poetry run ruff check src tests

      - name: Run MyPy
        run: poetry run mypy src tests

      - name: Run Pytest
        run: poetry run pytest

  dockerhub-push:
    needs: tests
    uses: yuri-kazliak/automation/.github/workflows/docker-hub-push.yml@main
    with:
      image_name: ${{ env.IMAGE_NAME }}
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
    secrets:
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  do-deploy:
    needs: dockerhub-push
    uses: yuri-kazliak/automation/.github/workflows/digital-ocean-deploy.yml@main
    with:
      image_name: ${{ env.IMAGE_NAME }}
      image_digest: ${{ needs.dockerhub-push.outputs.image_digest }} # immutable deploy
      docker_container_name: ${{ vars.CONTAINER_NAME }}
      do_host: ${{ vars.DO_HOST }}
      do_username: root
      docker_port_mapping: 8018
    secrets:
      do_ssh_key: ${{ secrets.DO_SSHKEY }}
