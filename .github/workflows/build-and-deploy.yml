name: ci

on:
  push:
    branches:
      - "main"

env:
  # REGISTRY: "your-digitalocean-registry-container-url"
  IMAGE_NAME: "jdwdafhsadgfjaksdghfkjsadhgf/my_basket_api:0.0.1"
