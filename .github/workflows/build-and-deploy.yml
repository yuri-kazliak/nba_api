name: NBA Stats API CI/CD

permissions:
  contents: read

on:
  release:
    types: [published]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "poetry"

      - name: Set up Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: false

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run Ruff
        run: poetry run ruff check src tests

      - name: Run MyPy
        run: poetry run mypy src tests

      - name: Run Pytest
        run: poetry run pytest

  dockerhub-push:
    needs: tests
    uses: yuri-kazliak/automation/.github/workflows/docker-hub-push.yml@main
    with:
      image_name: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.CONTAINER_NAME }}:${{ github.ref_name }}
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
    secrets:
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  do-deploy:
    needs: dockerhub-push
    uses: yuri-kazliak/automation/.github/workflows/digital-ocean-deploy.yml@main
    with:
      image_name: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.CONTAINER_NAME }}:${{ github.ref_name }}
      docker_container_name: ${{ vars.CONTAINER_NAME }}
      do_host: ${{ vars.DO_HOST }}
      do_username: root
      docker_port_mapping: 8018
    secrets:
      do_ssh_key: ${{ secrets.DO_SSHKEY }}
